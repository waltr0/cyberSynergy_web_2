<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON_MARKET // UNDERGROUND</title>
    <style>
        :root {
            --neon-pink: #ff2a9d;
            --neon-cyan: #00f3ff;
            --dark-bg: #05000a;
            --panel-bg: rgba(10, 0, 15, 0.85);
            --pink-glow: 0 0 10px #ff2a9d, 0 0 20px #ff2a9d;
            --cyan-glow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
        }
        
        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Courier New', monospace;
            margin: 0; padding: 0;
            overflow-x: hidden;
            height: 100vh;
        }

        /* THE 3D ANIMATED GRID FLOOR */
        .grid-wrapper {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 60vh;
            perspective: 600px;
            z-index: -2;
            overflow: hidden;
        }
        .grid {
            position: absolute;
            width: 200%; height: 200%;
            bottom: -50%; left: -50%;
            background-image: 
                linear-gradient(var(--neon-pink) 2px, transparent 2px),
                linear-gradient(90deg, var(--neon-cyan) 2px, transparent 2px);
            background-size: 60px 60px;
            transform: rotateX(75deg);
            animation: moveGrid 3s linear infinite;
            opacity: 0.5;
        }
        /* Gradient mask to make the grid fade into the horizon */
        .grid-mask {
            position: fixed;
            bottom: 0; left: 0; width: 100%; height: 60vh;
            background: linear-gradient(to bottom, var(--dark-bg) 0%, transparent 100%);
            z-index: -1;
        }

        @keyframes moveGrid {
            0% { transform: rotateX(75deg) translateY(0); }
            100% { transform: rotateX(75deg) translateY(60px); }
        }

        /* MAIN CONTAINER */
        .container {
            position: relative;
            max-width: 850px; margin: 40px auto;
            border: 2px solid var(--neon-cyan); padding: 30px;
            background: var(--panel-bg);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3), inset 0 0 20px rgba(255, 42, 157, 0.2);
            border-radius: 15px;
            z-index: 1;
            backdrop-filter: blur(8px);
        }

        /* PULSING TITLE */
        h1 { 
            color: #fff; text-shadow: var(--pink-glow); 
            text-transform: uppercase; border-bottom: 2px dashed var(--neon-pink); 
            padding-bottom: 10px; animation: pulseText 2s infinite alternate;
        }
        h2 { color: var(--neon-cyan); text-shadow: var(--cyan-glow); }

        @keyframes pulseText {
            0% { text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink); }
            100% { text-shadow: 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink), 0 0 60px var(--neon-pink); }
        }

        /* FORMS & BUTTONS */
        input, button {
            background: rgba(0, 0, 0, 0.7); border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan); padding: 12px; width: 95%;
            font-family: inherit; margin-bottom: 15px; border-radius: 5px;
            transition: 0.3s;
        }
        input:focus { outline: none; box-shadow: 0 0 15px var(--neon-cyan); }
        
        button {
            font-weight: bold; cursor: pointer; text-shadow: var(--cyan-glow);
            letter-spacing: 2px;
        }
        button:hover { 
            background: var(--neon-cyan); color: #000; 
            box-shadow: 0 0 25px var(--neon-cyan); text-shadow: none;
        }

        /* NAVIGATION */
        .nav { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 15px;}
        .nav a { 
            color: #fff; text-decoration: none; padding: 8px 15px; 
            border: 1px solid transparent; transition: 0.3s; border-radius: 3px;
        }
        .nav a:hover { 
            border: 1px solid var(--neon-pink); box-shadow: 0 0 15px rgba(255, 42, 157, 0.5); 
            color: var(--neon-pink); background: rgba(255, 42, 157, 0.1);
        }
        
        .flag-box { border: 2px dashed #0f0; padding: 20px; text-align: center; background: rgba(0, 255, 0, 0.1); margin-top: 20px; font-size: 1.2em; color: #0f0; text-shadow: 0 0 10px #0f0;}
    </style>
</head>
<body>
    <div class="grid-wrapper"><div class="grid"></div></div>
    <div class="grid-mask"></div>

    <div class="container">
        <header>
            <h1>>> NEON_MARKET_DB</h1>
            <p style="color: #0df; font-weight: bold;">[ CONNECTION ESTABLISHED : ENCRYPTED ]</p>
        </header>
        
        <nav class="nav">
            <a href="{{ url_for('shop') }}">[ MARKET ]</a>
            <a href="{{ url_for('cart') }}">[ CART ]</a>
            <a href="{{ url_for('download') }}">[ INVOICES ]</a>
            <a href="{{ url_for('stock') }}">[ WAREHOUSE_PING ]</a>
        </nav>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
